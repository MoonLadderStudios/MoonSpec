slug: moonspec-orchestrate
title: MoonSpec Orchestrate
description: Run the full MoonSpec lifecycle from a preselected single-story request or active feature context through specification, planning, alignment, implementation, and verification.
scope: global
tags:
  - moonspec
  - orchestration
  - runtime
requiredCapabilities:
  - git
annotations:
  sourceSkill: moonspec-orchestrate
  profile: runtime-first
inputs:
  - name: feature_request
    label: Feature Request
    type: markdown
    required: true
  - name: source_design_path
    label: Source Design Path
    type: text
    required: false
    default: ""
  - name: constraints
    label: Constraints
    type: textarea
    required: false
    default: ""
steps:
  - title: Create or select MoonSpec
    instructions: |-
      Use this preselected single-story request or active feature context as the canonical MoonSpec orchestration input:
      {{ inputs.feature_request }}

      Additional constraints:
      {{ inputs.constraints }}

      MoonSpec Orchestrate always runs as a runtime implementation workflow.
      If the request points at a document path, treat the document as runtime source requirements.
      Source design path (optional): {{ inputs.source_design_path }}.

      Before running moonspec-specify, validate that the input is already exactly one independently testable story or an active feature directory with an existing one-story spec.md.
      If the input is a broad design, names multiple stories/features, asks to split or implement all stories, or otherwise cannot be bounded to one independently testable story without selection, stop immediately and report that MoonSpec Orchestrate requires a preselected single story and that the input must be routed through moonspec-breakdown or another upstream selector first.
      Run moonspec-specify unless an active spec.md already passes the specify gate.
      Do not classify this input into a different workflow and do not run moonspec-breakdown from this preset; any story splitting must already be complete before MoonSpec Orchestrate starts.
      Preserve the original request or source design in spec.md so final verification can compare against it.
    skill:
      id: moonspec-specify
      args: {}
  - title: Plan selected spec
    instructions: |-
      Run moonspec-plan when plan.md or required design artifacts are missing or stale.
      Verify that plan.md, research.md, quickstart.md, and any required data model or contracts exist before continuing.
      Keep unit and integration test strategies explicit.
    skill:
      id: moonspec-plan
      args: {}
  - title: Generate TDD task breakdown
    instructions: |-
      Run moonspec-tasks when tasks.md is missing or upstream artifacts changed.
      Verify tasks.md covers exactly one story and includes red-first unit tests, integration tests, implementation tasks, story validation, and final /moonspec.verify work.
    skill:
      id: moonspec-tasks
      args: {}
  - title: Align MoonSpec artifacts
    instructions: |-
      Run moonspec-align after task generation.
      Let moonspec-align analyze and remediate artifact drift conservatively without manual analyze prompts, scripted user approvals, or extra Prompt A/Prompt B loops.
      If alignment changes spec.md, plan.md, design artifacts, or tasks.md, re-check the downstream gates and regenerate only artifacts that are now stale.
    skill:
      id: moonspec-align
      args: {}
  - title: Implement the task breakdown
    instructions: |-
      Run moonspec-implement when implementation work remains.
      Require TDD evidence: unit and integration tests are written and confirmed failing before production code.
      Mark completed tasks [X] in tasks.md and preserve the selected story scope.
    skill:
      id: moonspec-implement
      args: {}
      requiredCapabilities:
        - git
  - title: Verify completion
    instructions: |-
      Run moonspec-verify as the final read-only gate unless an up-to-date verification report already covers the current code and artifacts.
      If the verdict is ADDITIONAL_WORK_NEEDED, use the report as the remaining-work list and run at most two bounded implementation and verification cycles.
      If the remaining work is dominated by documentation-type gaps — the canonical document, not the code, blocks completion — run moonspec-doc-reconcile in escalate-only mode instead of another remediation cycle, then stop and report that outcome.
      If the verdict is NO_DETERMINATION, stop and report the missing evidence, commands, or context.
      If the verdict is BLOCKED, stop and report the environment diagnostic and minimum repair.
      Claim completion only when the verdict is FULLY_IMPLEMENTED.
    skill:
      id: moonspec-verify
      args: {}
  - title: Reconcile declarative docs
    instructions: |-
      Run moonspec-doc-reconcile only when the final moonspec-verify verdict is FULLY_IMPLEMENTED and at least one canonical source candidate exists: spec.md records a canonical source document, the breakdown sourceReference.path points under docs/, or the orchestration step provides a source design path under docs/{% if inputs.source_design_path %} (source design path: {{ inputs.source_design_path }}){% endif %}.
      If no canonical source candidate exists, report no_update_required and finish.
      Consume the latest verification report, including its Source Document Drift section, plus artifacts/doc-discoveries/<feature>.json when present.
      Apply the update gate strictly: edit canonical docs only for definite, evidence-backed discoveries showing the document is impossible to satisfy as written, unclear, or internally inconsistent. Deliberate divergence from a satisfiable documented approach escalates for an owner decision instead of editing. A no-op outcome is a correct result.
      Report exactly one outcome: updated, no_update_required, or escalated. Escalation creates a tracker issue when integration exists (otherwise a full escalation record in the structured output) and does not retroactively fail verification.
    skill:
      id: moonspec-doc-reconcile
      args: {}
