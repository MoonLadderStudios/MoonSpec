name: MoonSpec Bundle

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Validate bundle
        run: uv run python tools/validate_bundle.py

      - name: Run tests
        run: uv run pytest
